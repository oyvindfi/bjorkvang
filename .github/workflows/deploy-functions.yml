name: Deploy Azure Functions

on:
  push:
    branches: [ main ]
    paths: [ 'functions/**' ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: bjorkvang-duhsaxahgfe0btgv
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'functions'
  NODE_VERSION: '18.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: 'Checkout'
      uses: actions/checkout@v4

    - name: Setup Node ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: 'Install dependencies and build'
      shell: bash
      run: |
        pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
        npm install
        npm run build --if-present
        popd

    - name: 'Deploy to Azure Functions'
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

    - name: 'Post-deployment verification'
      shell: bash
      run: |
        echo "Waiting for deployment to complete..."
        sleep 30
        
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          https://${{ env.AZURE_FUNCTIONAPP_NAME }}.westeurope-01.azurewebsites.net/api/booking/calendar)

        if [ "$response" -eq 200 ]; then
          echo "✅ Health check passed!"
        else
          echo "⚠️  Calendar endpoint returned: $response (may still be starting up)"
        fi
